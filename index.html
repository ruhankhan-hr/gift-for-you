<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Surprise</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #0a0a0a; /* শুরুতে ডার্ক থিম */
            font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
            transition: background 1s ease;
        }

        /* Click Here Button Design */
        #click-btn {
            background: transparent;
            color: #ff4d6d;
            border: 2px solid #ff4d6d;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            z-index: 100;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(255, 77, 109, 0.3);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #click-btn:hover {
            background: #ff4d6d;
            color: white;
            box-shadow: 0 0 25px rgba(255, 77, 109, 0.6);
        }

        /* Fingerprint Area (Click করার পর আসবে) */
        #scan-area {
            display: none;
            text-align: center;
            z-index: 100;
        }

        .fingerprint-icon {
            width: 80px; height: 80px;
            fill: #ff4d6d;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.7; }
        }

        /* Main Content */
        #main-content {
            display: none;
            z-index: 10; width: 85%; max-width: 350px;
            background: white; padding: 25px;
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            animation: popUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popUp { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .main-img { width: 100%; border-radius: 15px; border: 3px solid #ff4d6d; margin-bottom: 15px; }
        h1 { color: #ff4d6d; font-size: 24px; }
        #wish-text { font-size: 18px; color: #333; font-weight: bold; }

        /* Floating Hearts */
        .heart-bg {
            position: absolute; color: #ff4d6d;
            font-size: 20px; animation: move 4s linear infinite;
            z-index: 1; opacity: 0.6;
        }
        @keyframes move {
            0% { transform: translateY(100vh) rotate(0deg); }
            100% { transform: translateY(-10vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <button id="click-btn" onclick="startProcess()">Click Here</button>

    <div id="scan-area">
        <svg class="fingerprint-icon"
