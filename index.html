<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Surprise</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #0a0a0a;
            font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
            transition: background 1.5s ease;
        }

        /* Scanning Section */
        #scan-area {
            text-align: center;
            z-index: 100;
        }

        .fingerprint-icon {
            width: 80px; height: 80px;
            fill: #ff4d6d;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.7; }
        }

        /* Main Content */
        #main-content {
            display: none;
            z-index: 10; width: 85%; max-width: 350px;
            background: white; padding: 25px;
            border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            text-align: center;
            animation: popUp 0.8s ease;
        }

        @keyframes popUp { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .main-img { width: 100%; border-radius: 15px; border: 3px solid #ff4d6d; margin-bottom: 15px; }
        h1 { color: #ff4d6d; font-size: 24px; margin-bottom: 10px; }
        
        /* Message Styling */
        #wish-text {
            font-size: 18px; color: #333; font-weight: 600;
            min-height: 50px; transition: 0.5s;
        }

        /* Floating Hearts */
        .heart-bg {
            position: absolute; color: #ff4d6d;
            font-size: 20px; animation: move 4s linear infinite;
            z-index: 1; opacity: 0.6;
        }
        @keyframes move {
            0% { transform: translateY(100vh) rotate(0deg); }
            100% { transform: translateY(-10vh) rotate(360deg); }
        }
    </style>
</head>
<body onload="checkFirstTime()">

    <div id="scan-area">
        <svg class="fingerprint-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M17.81 4.47c-.08 0-.16-.02-.23-.06C15.66 3.42 14 3 12.01 3c-1.98 0-3.86.47-5.57 1.41-.24.13-.54.04-.67-.2-.13-.24-.04-.55.2-.68C7.82 2.52 9.86 2 12.01 2c2.13 0 3.99.47 6.03 1.56.24.13.33.43.21.67-.09.15-.24.24-.44.24zm3.04 3.03c-.11 0-.22-.03-.33-.1-.08-.05-3.32-2.16-8.51-2.16-5.2 0-8.43 2.11-8.51 2.16-.24.13-.54.06-.68-.18-.14-.24-.06-.54.18-.68.17-.1 3.61-2.3 9.01-2.3 5.4 0 8.84 2.2 9.01 2.3.24.14.32.44.18.68-.09.16-.25.28-.49.28zm-3.04 14c-.11 0-.21-.03-.31-.1-.13-.08-2.61-1.63-5.51-1.63-2.89 0-5.38 1.55-5.51 1.63-.24.13-.55.06-.69-.17-.14-.24-.06-.54.17-.68.3-.19 3.01-1.78 6.03-1.78 3.02 0 5.73 1.59 6.03 1.78.24.14.32.44.18.68-.09.17-.26.27-.4.27zM12 22c-5.52 0-10-4.48-10-10S6.48 2 12 2s10 4.48 10 10-4.48 10-10 10zm0-18c-4.41 0-8 3.59-8 8s3.59 8 8 8 8-3.59 8-8-3.59-8-8-8z"/>
        </svg>
        <p style="color:#ff4d6d; font-weight:bold; margin-top:10px;">Scanning Surprises...</p>
    </div>

    <div id="main-content">
        <img src="1774963235042.jpg" id="birthday-pic" class="main-img" alt="Surprise">
        <h1 id="title-text">Happy Birthday, Jorda! ❤️</h1>
        <div id="wish-text">Loading special messages...</div>
        <p style="font-size: 25px; margin-top: 10px;">🎂✨🎁</p>
    </div>

    <script>
        const messages = [
            "Happy birthday Jorda 🥳!",
            "Duya kori allah jeno tomar shob moner asha puron kore! 😇",
            "Shobshomoy hashikhushi thako! 🥂",
            "Enjoy your day happily",
            "tumi shobshomoy amar priyo chila poroborti teo thakba.once again happy birthday jafrin ☺️",
            "lastly 😶‍🌫️i love you 😶‍🌫️!"
        ];
        let msgIndex = 0;

        function checkFirstTime() {
            const hasScanned = localStorage.getItem("scannedBefore");

            if (hasScanned) {
                // যদি আগে স্ক্যান করে থাকে, তবে টাইটেল মুছে ফেলো
                document.getElementById('title-text').style.display = 'none';
                showSurprise();
            } else {
                // প্রথমবার হলে স্ক্যানিং এনিমেশন দেখাও
                document.getElementById('scan-area').style.display = 'block';
                setTimeout(() => {
                    localStorage.setItem("scannedBefore", "true");
                    showSurprise();
                }, 3500); 
            }
        }

        function showSurprise() {
            document.getElementById('scan-area').style.display = 'none';
            document.body.style.backgroundColor = '#ffeff2';
            const mainContent = document.getElementById('main-content');
            mainContent.style.display = 'block';

            setInterval(createHeart, 300);
            displayNextMessage();
        }

        function displayNextMessage() {
            if (msgIndex < messages.length) {
                document.getElementById('wish-text').innerText = messages[msgIndex];
                msgIndex++;
                setTimeout(displayNextMessage, 3000);
            } else {
                document.getElementById('wish-text').innerHTML = "<span style='color:#ff4d6d; font-size:22px;'>Thank You ❤️</span>";
            }
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.classList.add('heart-bg');
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = (Math.random() * 2 + 3) + "s";
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 4000);
        }
    </script>
</body>
</html>
